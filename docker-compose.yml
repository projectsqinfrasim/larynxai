version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: larynxai
      POSTGRES_USER: larynxai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-larynxai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U larynxai"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application services ────────────────────────────────────────────────────
  session-service:
    build:
      context: .
      dockerfile: packages/session-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3005"
      REDIS_URL: redis://redis:6379
    ports:
      - "3005:3005"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  stt-service:
    build:
      context: .
      dockerfile: packages/stt-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      GRADIUM_API_KEY: ${GRADIUM_API_KEY}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  tts-service:
    build:
      context: .
      dockerfile: packages/tts-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3002"
      GRADIUM_API_KEY: ${GRADIUM_API_KEY}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-service:
    build:
      context: .
      dockerfile: packages/llm-service/Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3003"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
      SESSION_SERVICE_URL: http://session-service:3005
    ports:
      - "3003:3003"
    depends_on:
      session-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  feedback-service:
    build:
      context: .
      dockerfile: packages/feedback-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3004"
    ports:
      - "3004:3004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3000"
      STT_SERVICE_URL: http://stt-service:3001
      TTS_SERVICE_URL: http://tts-service:3002
      LLM_SERVICE_URL: http://llm-service:3003
      FEEDBACK_SERVICE_URL: http://feedback-service:3004
      SESSION_SERVICE_URL: http://session-service:3005
    ports:
      - "3000:3000"
    depends_on:
      session-service:
        condition: service_healthy
      stt-service:
        condition: service_healthy
      tts-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      feedback-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:
